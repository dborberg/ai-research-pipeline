name: Weekly Reports Manual Trigger

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which weekly report to generate and send
        required: true
        default: WHOLESALER
        type: choice
        options:
          - WHOLESALER
          - THEMATIC
          - SIGNAL

jobs:
  run-weekly-investment:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python run_weekly_investment_pipeline.py --mode ${{ inputs.mode }}

      - name: Persist weekly outputs and database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add outputs/weekly || true
          git add -f data/ai_research.db || true
          git commit -m "Update weekly outputs (automated)" || true
          git push
