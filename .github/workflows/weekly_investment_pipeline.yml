name: Weekly Reports Manual Trigger

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which weekly report to generate and send
        required: true
        default: WHOLESALER
        type: choice
        options:
          - WHOLESALER
          - THEMATIC

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ai-research-pipeline

jobs:
  run-weekly-investment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Export runtime secrets from GCP
        run: bash scripts/export_gcp_runtime_secrets.sh

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python run_weekly_investment_pipeline.py --mode ${{ inputs.mode }}

      - name: Persist weekly outputs and database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add outputs/weekly || true
          git add -f data/ai_research.db || true
          git commit -m "Update weekly outputs (automated)" || true
          git push
