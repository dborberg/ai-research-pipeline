name: Generate Sector Report

on:
  workflow_dispatch:
    inputs:
      sector:
        description: "Sector adapter to use for prompt assembly"
        required: true
        type: choice
        options:
          - communication_services
          - consumer_discretionary
          - consumer_staples
          - energy
          - financials
          - healthcare
          - industrials
          - information_technology
          - materials
          - real_estate
          - utilities
      industry_focus:
        description: "Sector-level balanced view or standard GICS industry emphasis"
        required: false
        default: balanced
        type: choice
        options:
          - balanced
          - diversified_telecommunication_services
          - wireless_telecommunication_services
          - media
          - entertainment
          - interactive_media_and_services
          - automobile_components
          - automobiles
          - household_durables
          - leisure_products
          - distributors
          - diversified_consumer_services
          - hotels_restaurants_and_leisure
          - broadline_retail
          - specialty_retail
          - textiles_apparel_and_luxury_goods
          - consumer_staples_distribution_and_retail
          - beverages
          - food_products
          - tobacco
          - household_products
          - personal_care_products
          - energy_equipment_and_services
          - oil_gas_and_consumable_fuels
          - banks
          - financial_services
          - capital_markets
          - mortgage_real_estate_investment_trusts_reits
          - consumer_finance
          - insurance
          - healthcare_equipment_and_supplies
          - healthcare_providers_and_services
          - healthcare_technology
          - biotechnology
          - pharmaceuticals
          - life_sciences_tools_and_services
          - aerospace_and_defense
          - building_products
          - construction_and_engineering
          - electrical_equipment
          - industrial_conglomerates
          - machinery
          - trading_companies_and_distributors
          - commercial_services_and_supplies
          - professional_services
          - air_freight_and_logistics
          - passenger_airlines
          - marine_transportation
          - ground_transportation
          - transportation_infrastructure
          - it_services
          - software
          - communications_equipment
          - technology_hardware_storage_and_peripherals
          - electronic_equipment_instruments_and_components
          - semiconductors_and_semiconductor_equipment
          - chemicals
          - construction_materials
          - containers_and_packaging
          - metals_and_mining
          - paper_and_forest_products
          - equity_real_estate_investment_trusts_reits
          - real_estate_management_and_development
          - electric_utilities
          - gas_utilities
          - multi_utilities
          - water_utilities
          - independent_power_and_renewable_electricity_producers
      audience:
        description: "Target audience for the generated report"
        required: false
        default: "financial advisors and investment professionals"
        type: string
      time_horizon:
        description: "Time horizon to emphasize"
        required: false
        default: "1-3 years and 3-7 years"
        type: string
      style_notes:
        description: "Optional style guidance"
        required: false
        default: ""
        type: string
      special_instructions:
        description: "Optional run-specific instructions"
        required: false
        default: ""
        type: string
      model:
        description: "OpenAI model used to generate the final report"
        required: false
        default: "gpt-5.5"
        type: string

jobs:
  assemble-validate-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create prompt artifact directory
        run: mkdir -p artifacts out

      - name: Validate required secrets
        run: |
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "OPENAI_API_KEY secret is required to generate the sector report."
            exit 1
          fi
          if [[ -z "${EMAIL_USER}" || -z "${EMAIL_PASSWORD}" || -z "${EMAIL_TO}" ]]; then
            echo "EMAIL_USER, EMAIL_PASSWORD, and EMAIL_TO secrets are required to email the sector report."
            exit 1
          fi

      - name: Resolve effective special instructions
        run: |
          PRESET_TEXT="$(python scripts/resolve_sector_focus.py \
            --sector "${{ inputs.sector }}" \
            --industry-focus "${{ inputs.industry_focus }}")"

          USER_TEXT="${{ inputs.special_instructions }}"

          if [[ -n "$PRESET_TEXT" && -n "$USER_TEXT" ]]; then
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$PRESET_TEXT $USER_TEXT"
          elif [[ -n "$PRESET_TEXT" ]]; then
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$PRESET_TEXT"
          else
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$USER_TEXT"
          fi

          {
            echo "EFFECTIVE_SPECIAL_INSTRUCTIONS<<EOF"
            echo "$EFFECTIVE_SPECIAL_INSTRUCTIONS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Render assembled prompt package
        run: |
          python scripts/render_prompt.py \
            --sector-name "${{ inputs.sector }}" \
            --audience "${{ inputs.audience }}" \
            --time-horizon "${{ inputs.time_horizon }}" \
            --style-notes "${{ inputs.style_notes }}" \
            --special-instructions "${EFFECTIVE_SPECIAL_INSTRUCTIONS}"
          cp "out/final_prompt_${{ inputs.sector }}.md" artifacts/assembled_prompt.md

      - name: Preview assembled prompt
        run: sed -n '1,220p' artifacts/assembled_prompt.md

      - name: Validate assembled prompt package
        run: |
          python scripts/validate_prompt_package.py \
            --prompt-package artifacts/assembled_prompt.md \
            --sector-name "${{ inputs.sector }}"

      - name: Generate sector report HTML
        run: |
          python scripts/generate_sector_report.py \
            --prompt-package artifacts/assembled_prompt.md \
            --model "${{ inputs.model }}" \
            --output-format html \
            --output artifacts/sector_report.html

      - name: Preview generated report
        run: sed -n '1,220p' artifacts/sector_report.html

      - name: Email generated report
        run: |
          python scripts/send_sector_report.py \
            --sector "${{ inputs.sector }}" \
            --report-path artifacts/sector_report.html

      - name: Add run summary
        run: |
          {
            echo "## Sector Report Run"
            echo ""
            echo "- Sector: \`${{ inputs.sector }}\`"
            echo "- Industry focus: \`${{ inputs.industry_focus }}\`"
            echo "- Audience: \`${{ inputs.audience }}\`"
            echo "- Time horizon: \`${{ inputs.time_horizon }}\`"
            echo "- Model: \`${{ inputs.model }}\`"
            echo "- Validation: passed"
            echo "- Output: generated and emailed"
            echo ""
            echo "### Report Preview"
            echo ""
            echo '```html'
            sed -n '1,120p' artifacts/sector_report.html
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload assembled prompt artifact
        uses: actions/upload-artifact@v4
        with:
          name: assembled-sector-report-prompt
          path: artifacts/assembled_prompt.md

      - name: Upload generated report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sector-ai-impact-report-html
          path: artifacts/sector_report.html
