name: Generate Sector Report Prompt

on:
  workflow_dispatch:
    inputs:
      sector:
        description: "Sector adapter to use for prompt assembly"
        required: true
        type: choice
        options:
          - healthcare
          - financials
          - industrials
          - energy
          - software
          - semiconductors
          - consumer_discretionary
          - consumer_staples
          - utilities
          - materials
          - communication_services
          - real_estate
      audience:
        description: "Target audience for the generated report"
        required: false
        default: "financial advisors and investment professionals"
        type: string
      time_horizon:
        description: "Time horizon to emphasize"
        required: false
        default: "1-3 years and 3-7 years"
        type: string
      style_notes:
        description: "Optional style guidance"
        required: false
        default: ""
        type: string
      special_instructions:
        description: "Optional run-specific instructions"
        required: false
        default: ""
        type: string
      healthcare_focus_preset:
        description: "Healthcare-only emphasis preset"
        required: false
        default: balanced
        type: choice
        options:
          - balanced
          - biotech_diagnostics
          - homecare_physical_ai
          - providers_payers
          - therapeutics_only

jobs:
  assemble-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create prompt artifact directory
        run: mkdir -p artifacts out

      - name: Resolve effective special instructions
        run: |
          PRESET_TEXT=""

          if [[ "${{ inputs.sector }}" == "healthcare" ]]; then
            case "${{ inputs.healthcare_focus_preset }}" in
              balanced)
                PRESET_TEXT="For healthcare, keep the analysis balanced across all four required pillars and do not let the report collapse into mostly administrative workflow automation."
                ;;
              biotech_diagnostics)
                PRESET_TEXT="For healthcare, place extra emphasis on biotechnology and therapeutic development plus diagnostic intelligence at scale, while still covering all four required analytical pillars."
                ;;
              homecare_physical_ai)
                PRESET_TEXT="For healthcare, place extra emphasis on the long-run in-home healthcare transformation enabled by physical AI, robotics, ambient sensing, and agentic care systems, while still covering all four required analytical pillars."
                ;;
              providers_payers)
                PRESET_TEXT="For healthcare, place extra emphasis on providers and payers, including clinical workflow, administrative efficiency, reimbursement dynamics, care coordination, diagnostic support adoption, and where economic value may accrue across care delivery and managed care, while still covering all four required analytical pillars."
                ;;
              therapeutics_only)
                PRESET_TEXT="For healthcare, place extra emphasis on biotechnology and therapeutic development, including target discovery, molecule design, biomarker discovery, patient stratification, clinical trial design, protocol optimization, R&D productivity, probability of success, and development timelines, while still covering all four required analytical pillars."
                ;;
            esac
          fi

          USER_TEXT="${{ inputs.special_instructions }}"

          if [[ -n "$PRESET_TEXT" && -n "$USER_TEXT" ]]; then
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$PRESET_TEXT $USER_TEXT"
          elif [[ -n "$PRESET_TEXT" ]]; then
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$PRESET_TEXT"
          else
            EFFECTIVE_SPECIAL_INSTRUCTIONS="$USER_TEXT"
          fi

          {
            echo "EFFECTIVE_SPECIAL_INSTRUCTIONS<<EOF"
            echo "$EFFECTIVE_SPECIAL_INSTRUCTIONS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Render assembled prompt package
        run: |
          python scripts/render_prompt.py \
            --sector-name "${{ inputs.sector }}" \
            --audience "${{ inputs.audience }}" \
            --time-horizon "${{ inputs.time_horizon }}" \
            --style-notes "${{ inputs.style_notes }}" \
            --special-instructions "${EFFECTIVE_SPECIAL_INSTRUCTIONS}"
          cp "out/final_prompt_${{ inputs.sector }}.md" artifacts/assembled_prompt.md

      - name: Preview assembled prompt
        run: sed -n '1,220p' artifacts/assembled_prompt.md

      - name: Validate assembled prompt package
        run: |
          python scripts/validate_prompt_package.py \
            --prompt-package artifacts/assembled_prompt.md \
            --sector-name "${{ inputs.sector }}"

      - name: Add run summary
        run: |
          {
            echo "## Sector Report Prompt Package"
            echo ""
            echo "- Sector: \`${{ inputs.sector }}\`"
            echo "- Audience: \`${{ inputs.audience }}\`"
            echo "- Time horizon: \`${{ inputs.time_horizon }}\`"
            echo "- Healthcare preset: \`${{ inputs.healthcare_focus_preset }}\`"
            echo "- Validation: passed"
            echo ""
            echo "### Prompt Preview"
            echo ""
            echo '```md'
            sed -n '1,120p' artifacts/assembled_prompt.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Future model invocation placeholder
        run: |
          echo "Placeholder: call your chosen model or provider here using artifacts/assembled_prompt.md."
          echo "Keep provider-specific secrets, SDK installs, and output handling in this section when you are ready."

      - name: Upload assembled prompt artifact
        uses: actions/upload-artifact@v4
        with:
          name: assembled-sector-report-prompt
          path: artifacts/assembled_prompt.md
