name: Monthly Digest

on:
  workflow_dispatch:
    inputs:
      scheduled_run:
        description: Set to true when this workflow is dispatched by GCP Cloud Scheduler
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Guard against duplicate runs
        id: guard
        run: |
          REPORT_MONTH=$(python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          central_now = datetime.now(ZoneInfo("America/Chicago"))
          first_day_of_current_month = central_now.date().replace(day=1)
          last_day_of_previous_month = first_day_of_current_month - timedelta(days=1)
          print(last_day_of_previous_month.strftime("%Y-%m"))
          PY
          )
          echo "REPORT_MONTH=$REPORT_MONTH" >> $GITHUB_ENV

          if [[ "${{ github.event.inputs.scheduled_run }}" == "true" ]] && git cat-file -e "HEAD:outputs/monthly/${REPORT_MONTH}.txt"; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "skip_run=true" >> $GITHUB_OUTPUT
            echo "Monthly output for ${REPORT_MONTH} already exists; skipping duplicate run."
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
            echo "skip_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run monthly pipeline
        if: steps.guard.outputs.skip_run != 'true'
        run: |
          python run_monthly_pipeline.py

      - name: Persist monthly outputs and database
        if: steps.guard.outputs.skip_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/monthly || true
          git add -f data/ai_research.db || true
          git diff --cached --quiet && exit 0
          git commit -m "Update monthly outputs (automated)"
          git fetch origin main
          git rebase -X ours origin/main
          git push
