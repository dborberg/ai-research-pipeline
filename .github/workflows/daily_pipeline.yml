name: Daily Riffs from the Gen AI Pipeline

on:
  schedule:
    - cron: '30 11 * 3-10 *'   # 6:30 AM CDT (March-October) — GitHub cron uses UTC
    - cron: '50 11 * 3-10 *'   # 6:50 AM CDT backup trigger in case the primary run is delayed or dropped
    - cron: '30 12 * 1-2,11-12 *'   # 6:30 AM CST (January-February, November-December) — GitHub cron uses UTC
    - cron: '50 12 * 1-2,11-12 *'   # 6:50 AM CST backup trigger in case the primary run is delayed or dropped
  workflow_dispatch:

# Separate concurrency groups for scheduled vs. manual runs so that
# ad-hoc workflow_dispatch triggers (e.g., debugging sessions) don't queue
# behind — or delay — the scheduled morning pipeline.
# With cancel-in-progress: false, in-progress runs are never aborted, but
# only one pending run per group is allowed — if a newer run arrives while
# one is already waiting, the older pending run is dropped, preventing a
# backlog of queued jobs from building up.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Guard against duplicate scheduled runs
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          echo "CENTRAL_DATE=$CENTRAL_DATE" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "schedule" ]] && git cat-file -e "HEAD:outputs/daily/${CENTRAL_DATE}.txt"; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "Scheduled digest for ${CENTRAL_DATE} already exists in the repository; skipping duplicate run."
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        if: env.SKIP_RUN != 'true'
        run: python run_pipeline.py

      - name: Persist daily outputs and database
        if: env.SKIP_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily
          git add -f data/ai_research.db
          git diff --cached --quiet && exit 0
          git commit -m "Save daily pipeline state"
          git fetch origin main
          git rebase -X ours origin/main
          git push
