name: Daily Riffs from the Gen AI Pipeline

on:
  schedule:
    - cron: '30 11 * 3-10 *'   # 6:30 AM CDT (March-October)
    - cron: '30 12 * 1-2,11-12 *'   # 6:30 AM CST (January-February, November-December)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ NEW: visibility into your exact issue
      - name: Debug environment variables
        run: |
          echo "Checking environment variables..."
          if [ -z "$OPENAI_API_KEY" ]; then echo "OPENAI MISSING"; else echo "OPENAI OK"; fi
          if [ -z "$EMAIL_USER" ]; then echo "EMAIL USER MISSING"; else echo "EMAIL USER OK"; fi
          if [ -z "$EMAIL_PASSWORD" ]; then echo "EMAIL PASSWORD MISSING"; else echo "EMAIL PASSWORD OK"; fi
          if [ -z "$EMAIL_TO" ]; then echo "EMAIL TO MISSING"; else echo "EMAIL TO OK"; fi

      # ✅ Optional but helpful for debugging paths
      - name: Show working directory
        run: |
          pwd
          ls -la

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Commit daily digest output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily
          git diff --cached --quiet || git commit -m "Save daily digest output"
          git checkout -- .
          git pull --rebase origin main
          git push
