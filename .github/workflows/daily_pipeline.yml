name: Daily Riffs from the Gen AI Pipeline

on:
  schedule:
    # CDT (UTC-5): March through October
    - cron: '30 11 * 3-10 *'    # 6:30 AM CDT primary
    - cron: '30 14 * 3-10 *'    # 9:30 AM CDT backup 1 — fires if primary is delayed by GitHub's scheduler
    - cron: '30 17 * 3-10 *'    # 12:30 PM CDT backup 2
    - cron: '30 20 * 3-10 *'    # 3:30 PM CDT backup 3 — final safety net for severe scheduler delays
    # CST (UTC-6): January–February, November–December
    - cron: '30 12 * 1-2,11-12 *'   # 6:30 AM CST primary
    - cron: '30 15 * 1-2,11-12 *'   # 9:30 AM CST backup 1 — fires if primary is delayed by GitHub's scheduler
    - cron: '30 18 * 1-2,11-12 *'   # 12:30 PM CST backup 2
    - cron: '30 21 * 1-2,11-12 *'   # 3:30 PM CST backup 3 — final safety net for severe scheduler delays
  workflow_dispatch:
    inputs:
      scheduled_run:
        description: Set to true when this workflow is dispatched by GCP Cloud Scheduler
        required: false
        default: false
        type: boolean

# GitHub Actions scheduled workflows are subject to significant scheduler delays
# (often 1-4+ hours on busy days). Each cron gets its OWN concurrency group so
# that a pending or running earlier trigger doesn't block a later backup trigger.
#
# The "Guard against duplicate scheduled runs" step (git cat-file check) prevents
# duplicate emails: if an earlier trigger already committed and pushed today's
# output file, all subsequent triggers skip silently.
#
# Manual workflow_dispatch runs use group "workflow-workflow_dispatch-manual" —
# still one-pending-at-a-time to avoid accidental double-manual-triggers.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard against duplicate scheduled runs
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          echo "CENTRAL_DATE=$CENTRAL_DATE" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.scheduled_run }}" == "true" ]]; then
            PIPELINE_WINDOW=$(CENTRAL_DATE="$CENTRAL_DATE" python -c 'from datetime import datetime, timedelta, timezone; from zoneinfo import ZoneInfo; import os; central_date = os.environ["CENTRAL_DATE"]; window_end_central = datetime.fromisoformat(f"{central_date}T06:30:00").replace(tzinfo=ZoneInfo("America/Chicago")); window_end = window_end_central.astimezone(timezone.utc).replace(tzinfo=None); window_start = window_end - timedelta(hours=24); print(f"PIPELINE_WINDOW_START_UTC={window_start.isoformat()}"); print(f"PIPELINE_WINDOW_END_UTC={window_end.isoformat()}")')
          else
            PIPELINE_WINDOW=$(python -c 'from datetime import datetime, timedelta, timezone; window_end = datetime.now(timezone.utc).replace(microsecond=0); window_start = window_end - timedelta(hours=24); print(f"PIPELINE_WINDOW_START_UTC={window_start.isoformat()}"); print(f"PIPELINE_WINDOW_END_UTC={window_end.isoformat()}")')
          fi

          echo "$PIPELINE_WINDOW" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "schedule" && "${{ vars.USE_GCP_SCHEDULER }}" == "true" ]]; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "GitHub cron disabled because USE_GCP_SCHEDULER=true; expecting GCP-triggered workflow_dispatch instead."
          elif [[ ( "${{ github.event_name }}" == "schedule" || "${{ github.event.inputs.scheduled_run }}" == "true" ) ]] && git cat-file -e "HEAD:outputs/daily/${CENTRAL_DATE}.txt"; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "Scheduled digest for ${CENTRAL_DATE} already exists in the repository; skipping duplicate run."
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        if: env.SKIP_RUN != 'true'
        run: python run_pipeline.py

      - name: Persist daily outputs and database
        if: env.SKIP_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily
          git add -f data/ai_research.db
          git diff --cached --quiet && exit 0
          git commit -m "Save daily pipeline state"
          git fetch origin main
          git rebase -X ours origin/main
          git push
