name: Daily Riffs from the Gen AI Pipeline

on:
  schedule:
    # CDT (UTC-5): March through October
    - cron: '30 11 * 3-10 *'    # 6:30 AM CDT primary
    - cron: '30 14 * 3-10 *'    # 9:30 AM CDT backup — fires if primary is delayed >3 h by GitHub's scheduler
    - cron: '30 17 * 3-10 *'    # 12:30 PM CDT second backup — last-resort catch if both earlier triggers are skipped
    # CST (UTC-6): January–February, November–December
    - cron: '30 12 * 1-2,11-12 *'   # 6:30 AM CST primary
    - cron: '30 15 * 1-2,11-12 *'   # 9:30 AM CST backup — fires if primary is delayed >3 h by GitHub's scheduler
    - cron: '30 18 * 1-2,11-12 *'   # 12:30 PM CST second backup — last-resort catch if both earlier triggers are skipped
  workflow_dispatch:

# Each scheduled cron entry gets its OWN concurrency group (via github.event.schedule)
# so backup triggers are never silently dropped.
#
# The failure mode we must avoid: GitHub delays the 11:30 UTC primary by 3-4 hours.
# The primary is sitting in a PENDING state. At 14:30 UTC the backup cron fires — but
# if all triggers share ONE group ("workflow-schedule"), the backup sees the primary
# pending and gets DROPPED (cancel-in-progress: false only prevents cancelling a
# running job; a *pending* job blocks the slot and newer entrants are discarded).
#
# Fix: group includes the cron string, e.g., "workflow-schedule-30 11 * 3-10 *".
# Each of the 6 cron entries is now in its own independent group.  If the primary
# is delayed and still pending when a backup fires, the backup queues independently
# and runs when a runner is free.  The "Guard against duplicate scheduled runs" step
# (git cat-file check) prevents any actual duplicate output being generated.
#
# Manual workflow_dispatch runs use group "workflow-workflow_dispatch-manual" —
# still one-pending-at-a-time to avoid accidental double-manual-triggers.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard against duplicate scheduled runs
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          echo "CENTRAL_DATE=$CENTRAL_DATE" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "schedule" ]] && git cat-file -e "HEAD:outputs/daily/${CENTRAL_DATE}.txt"; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "Scheduled digest for ${CENTRAL_DATE} already exists in the repository; skipping duplicate run."
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        if: env.SKIP_RUN != 'true'
        run: python run_pipeline.py

      - name: Persist daily outputs and database
        if: env.SKIP_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily
          git add -f data/ai_research.db
          git diff --cached --quiet && exit 0
          git commit -m "Save daily pipeline state"
          git fetch origin main
          git rebase -X ours origin/main
          git push
