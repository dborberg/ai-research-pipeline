name: Daily Riffs from the Gen AI Pipeline

on:
  workflow_dispatch:
    inputs:
      scheduled_run:
        description: Set to true when this workflow is dispatched by GCP Cloud Scheduler
        required: false
        default: false
        type: boolean

# Cloud Scheduler is the authoritative trigger. This workflow remains manually
# dispatchable for testing, and scheduled_run=true is used for GCP-triggered
# dispatches so duplicate guards behave like production automation.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard against duplicate scheduled runs
        id: guard
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          echo "CENTRAL_DATE=$CENTRAL_DATE" >> $GITHUB_ENV

          if [[ "${{ github.event.inputs.scheduled_run }}" == "true" ]]; then
            PIPELINE_WINDOW=$(CENTRAL_DATE="$CENTRAL_DATE" python -c 'from datetime import datetime, timedelta, timezone; from zoneinfo import ZoneInfo; import os; central_date = os.environ["CENTRAL_DATE"]; window_end_central = datetime.fromisoformat(f"{central_date}T06:30:00").replace(tzinfo=ZoneInfo("America/Chicago")); window_end = window_end_central.astimezone(timezone.utc).replace(tzinfo=None); window_start = window_end - timedelta(hours=24); print(f"PIPELINE_WINDOW_START_UTC={window_start.isoformat()}"); print(f"PIPELINE_WINDOW_END_UTC={window_end.isoformat()}")')
          else
            PIPELINE_WINDOW=$(python -c 'from datetime import datetime, timedelta, timezone; window_end = datetime.now(timezone.utc).replace(microsecond=0); window_start = window_end - timedelta(hours=24); print(f"PIPELINE_WINDOW_START_UTC={window_start.isoformat()}"); print(f"PIPELINE_WINDOW_END_UTC={window_end.isoformat()}")')
          fi

          echo "$PIPELINE_WINDOW" >> $GITHUB_ENV

          if [[ "${{ github.event.inputs.scheduled_run }}" == "true" ]] && git cat-file -e "HEAD:outputs/daily/${CENTRAL_DATE}.txt"; then
            SKIP_RUN=true
            echo "Scheduled digest for ${CENTRAL_DATE} already exists in the repository; skipping duplicate run."
          else
            SKIP_RUN=false
          fi

          echo "SKIP_RUN=$SKIP_RUN" >> $GITHUB_ENV
          echo "skip_run=$SKIP_RUN" >> $GITHUB_OUTPUT

      - name: Run pipeline
        if: steps.guard.outputs.skip_run != 'true'
        run: python run_pipeline.py

      - name: Verify daily digest artifact exists
        if: steps.guard.outputs.skip_run != 'true'
        run: |
          test -f "outputs/daily/${CENTRAL_DATE}.txt" || {
            echo "Expected outputs/daily/${CENTRAL_DATE}.txt to exist after a successful daily pipeline run."
            exit 1
          }

      - name: Persist daily outputs and database
        if: always() && steps.guard.outputs.skip_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/daily
          git add -f data/ai_research.db
          git diff --cached --quiet && exit 0
          git commit -m "Save daily pipeline state"
          git fetch origin main
          git rebase -X ours origin/main
          git push
