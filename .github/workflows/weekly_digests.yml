name: Weekly Digests

on:
  schedule:
    - cron: "45 13 * * 5"
    - cron: "0 14 * * 5"
    - cron: "15 14 * * 5"
  workflow_dispatch:
    inputs:
      mode:
        description: Which weekly digest to send
        required: true
        default: WHOLESALER
        type: choice
        options:
          - WHOLESALER
          - THEMATIC
          - SIGNAL

permissions:
  contents: write

jobs:
  weekly-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: "REPLACE"
      EMAIL_USER: "REPLACE"
      EMAIL_PASSWORD: "REPLACE"
      EMAIL_TO: "REPLACE"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Determine job type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TYPE=${{ inputs.mode }}" >> $GITHUB_ENV
          else
            if [[ "${{ github.event.schedule }}" == "45 13 * * 5" ]]; then echo "TYPE=WHOLESALER" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "0 14 * * 5" ]]; then echo "TYPE=THEMATIC" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "15 14 * * 5" ]]; then echo "TYPE=SIGNAL" >> $GITHUB_ENV; fi
          fi

      - name: Debug run context
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Mode: $TYPE"
          echo "UTC Time: $(date -u)"

      - name: Run weekly pipeline
        if: env.TYPE != ''
        run: |
          python run_weekly_investment_pipeline.py --mode $TYPE

      - name: Persist database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.db || true
          git commit -m "Update DB (automated)" || true
          git push
