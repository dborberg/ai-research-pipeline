name: Weekly Digests

on:
  schedule:
    # CDT (UTC-5): March through October
    - cron: "0 13 * 3-10 5"       # 8:00 AM CDT  — WHOLESALER primary
    - cron: "0 16 * 3-10 5"       # 11:00 AM CDT — WHOLESALER backup (fires if primary delayed >3 h)
    - cron: "15 13 * 3-10 5"      # 8:15 AM CDT  — THEMATIC primary
    - cron: "15 16 * 3-10 5"      # 11:15 AM CDT — THEMATIC backup
    - cron: "30 13 * 3-10 5"      # 8:30 AM CDT  — SIGNAL primary
    - cron: "30 16 * 3-10 5"      # 11:30 AM CDT — SIGNAL backup
    # CST (UTC-6): January–February, November–December
    - cron: "0 14 * 1-2,11-12 5"  # 8:00 AM CST  — WHOLESALER primary
    - cron: "0 17 * 1-2,11-12 5"  # 11:00 AM CST — WHOLESALER backup
    - cron: "15 14 * 1-2,11-12 5" # 8:15 AM CST  — THEMATIC primary
    - cron: "15 17 * 1-2,11-12 5" # 11:15 AM CST — THEMATIC backup
    - cron: "30 14 * 1-2,11-12 5" # 8:30 AM CST  — SIGNAL primary
    - cron: "30 17 * 1-2,11-12 5" # 11:30 AM CST — SIGNAL backup
  workflow_dispatch:
    inputs:
      mode:
        description: Which weekly digest to send
        required: true
        default: WHOLESALER
        type: choice
        options:
          - WHOLESALER
          - THEMATIC
          - SIGNAL

# Each scheduled cron entry gets its OWN concurrency group (via github.event.schedule)
# so backup triggers are never silently dropped when the primary is still pending.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.schedule || inputs.mode || 'manual' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Determine job type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TYPE=${{ inputs.mode }}" >> $GITHUB_ENV
          else
            # CDT (months 3-10)
            if [[ "${{ github.event.schedule }}" == "0 13 * 3-10 5" ]];   then echo "TYPE=WHOLESALER" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "0 16 * 3-10 5" ]];   then echo "TYPE=WHOLESALER" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "15 13 * 3-10 5" ]];  then echo "TYPE=THEMATIC"   >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "15 16 * 3-10 5" ]];  then echo "TYPE=THEMATIC"   >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "30 13 * 3-10 5" ]];  then echo "TYPE=SIGNAL"     >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "30 16 * 3-10 5" ]];  then echo "TYPE=SIGNAL"     >> $GITHUB_ENV; fi
            # CST (months 1-2, 11-12)
            if [[ "${{ github.event.schedule }}" == "0 14 * 1-2,11-12 5" ]];  then echo "TYPE=WHOLESALER" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "0 17 * 1-2,11-12 5" ]];  then echo "TYPE=WHOLESALER" >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "15 14 * 1-2,11-12 5" ]]; then echo "TYPE=THEMATIC"   >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "15 17 * 1-2,11-12 5" ]]; then echo "TYPE=THEMATIC"   >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "30 14 * 1-2,11-12 5" ]]; then echo "TYPE=SIGNAL"     >> $GITHUB_ENV; fi
            if [[ "${{ github.event.schedule }}" == "30 17 * 1-2,11-12 5" ]]; then echo "TYPE=SIGNAL"     >> $GITHUB_ENV; fi
          fi

      - name: Debug run context
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Mode: $TYPE"
          echo "UTC Time: $(date -u)"

      - name: Guard against duplicate scheduled runs
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          WEEK_START=$(python -c "from datetime import date, timedelta; d=date.fromisoformat('${CENTRAL_DATE}'); n=(d.weekday()-4)%7; print((d - timedelta(days=n)).isoformat())")
          echo "WEEK_START=$WEEK_START" >> $GITHUB_ENV

          case "$TYPE" in
            WHOLESALER) OUTPUT_PATH="outputs/weekly/${WEEK_START}_wholesaler.txt" ;;
            THEMATIC) OUTPUT_PATH="outputs/weekly/${WEEK_START}_thematic.txt" ;;
            SIGNAL) OUTPUT_PATH="outputs/weekly/${WEEK_START}_signal_command_brief.txt" ;;
            *) OUTPUT_PATH="" ;;
          esac

          if [[ -n "$OUTPUT_PATH" ]]; then
            echo "OUTPUT_PATH=$OUTPUT_PATH" >> $GITHUB_ENV
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]] && [[ -n "$OUTPUT_PATH" ]] && git cat-file -e "HEAD:${OUTPUT_PATH}"; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "Scheduled weekly output already exists at ${OUTPUT_PATH}; skipping duplicate run."
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
          fi

      - name: Run weekly pipeline
        if: env.TYPE != '' && env.SKIP_RUN != 'true'
        run: |
          python run_weekly_investment_pipeline.py --mode $TYPE

      - name: Persist weekly outputs and database
        if: env.SKIP_RUN != 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add outputs/weekly || true
          git add -f data/ai_research.db || true
          git commit -m "Update weekly outputs (automated)" || true
          git push
