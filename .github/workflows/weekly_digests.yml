name: Weekly Digests

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which weekly digest to send
        required: true
        default: WHOLESALER
        type: choice
        options:
          - WHOLESALER
          - THEMATIC
      scheduled_run:
        description: Set to true when this workflow is dispatched by GCP Cloud Scheduler
        required: false
        default: false
        type: boolean

# Single concurrency group for the whole workflow so scheduler-dispatched and
# manual runs never execute in parallel.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ai-research-pipeline

jobs:
  weekly-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Export runtime secrets from GCP
        run: bash scripts/export_gcp_runtime_secrets.sh

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Fetch latest main for duplicate checks
        run: git fetch origin main

      - name: Determine job type
        id: determine_type
        run: |
          echo "TYPE=${{ inputs.mode }}" >> $GITHUB_ENV
          echo "type=${{ inputs.mode }}" >> $GITHUB_OUTPUT

      - name: Debug run context
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Scheduled run: ${{ github.event.inputs.scheduled_run }}"
          echo "Mode: $TYPE"
          echo "UTC Time: $(date -u)"

      - name: Validate run context
        run: |
          if [[ -z "$TYPE" ]]; then
            echo "Unable to determine weekly digest type from trigger context."
            exit 1
          fi

      - name: Guard against duplicate runs
        id: guard
        run: |
          CENTRAL_DATE=$(TZ=America/Chicago date +%F)
          WEEK_START=$(python -c "from datetime import date, timedelta; d=date.fromisoformat('${CENTRAL_DATE}'); n=(d.weekday()-4)%7; print((d - timedelta(days=n)).isoformat())")
          echo "WEEK_START=$WEEK_START" >> $GITHUB_ENV

          case "$TYPE" in
            WHOLESALER) OUTPUT_PATH="outputs/weekly/${WEEK_START}_wholesaler.txt" ;;
            THEMATIC) OUTPUT_PATH="outputs/weekly/${WEEK_START}_thematic.txt" ;;
            *) OUTPUT_PATH="" ;;
          esac

          if [[ -n "$OUTPUT_PATH" ]]; then
            echo "OUTPUT_PATH=$OUTPUT_PATH" >> $GITHUB_ENV
          fi

          if [[ -n "$OUTPUT_PATH" && "${{ github.event.inputs.scheduled_run }}" == "true" ]] && git cat-file -e "origin/main:${OUTPUT_PATH}"; then
            if [[ "$TYPE" == "WHOLESALER" ]]; then
              echo "SKIP_RUN=true" >> $GITHUB_ENV
              echo "skip_run=true" >> $GITHUB_OUTPUT
              echo "Weekly output already exists at ${OUTPUT_PATH}; skipping duplicate wholesaler generation run."
            else
              echo "SKIP_RUN=false" >> $GITHUB_ENV
              echo "skip_run=false" >> $GITHUB_OUTPUT
              echo "Weekly output already exists at ${OUTPUT_PATH}; continuing so ${TYPE} email can be sent from stored content."
            fi
          else
            echo "SKIP_RUN=false" >> $GITHUB_ENV
            echo "skip_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Hydrate persisted weekly artifacts
        if: steps.determine_type.outputs.type != '' && steps.guard.outputs.skip_run != 'true' && github.event.inputs.scheduled_run == 'true'
        run: |
          if [[ -n "$OUTPUT_PATH" ]] && git cat-file -e "origin/main:${OUTPUT_PATH}"; then
            git checkout origin/main -- "$OUTPUT_PATH"
          fi

          if git cat-file -e "origin/main:data/ai_research.db"; then
            git checkout origin/main -- data/ai_research.db
          fi

      - name: Run weekly pipeline
        if: steps.determine_type.outputs.type != '' && steps.guard.outputs.skip_run != 'true'
        run: |
          python run_weekly_investment_pipeline.py --mode $TYPE

      - name: Persist weekly outputs and database
        if: steps.guard.outputs.skip_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/weekly || true
          git add -f data/ai_research.db || true
          git diff --cached --quiet && exit 0
          git commit -m "Update weekly outputs (automated)"
          git fetch origin main
          git rebase -X ours origin/main
          git push
